<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISYARA • Laporan & Ulasan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- CDN Alternatif 1: jsDelivr -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.2/css/all.min.css">

    <!-- CDN Alternatif 2: Bootstrap CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
        body {
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            padding: 40px 35px;
            max-width: 560px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(31,38,135,0.12);
            border: 1px solid rgba(255,255,255,0.4);
        }
        .card .logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: #0f4c81;
            margin-bottom: 6px;
        }
        .card .logo i { color: #1e88e5; margin-right: 8px; }
        .card .sub {
            color: #555;
            font-size: 0.95rem;
            margin-bottom: 28px;
        }
        .card label {
            display: block;
            font-weight: 500;
            margin-top: 18px;
            font-size: 0.9rem;
        }
        .card label .required { color: #d32f2f; margin-left: 4px; }
        .card input, .card select, .card textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 16px;
            font-size: 1rem;
            margin-top: 6px;
            background: #f8faff;
            transition: border 0.3s;
        }
        .card input:focus, .card select:focus, .card textarea:focus {
            border-color: #1e88e5;
            outline: none;
            box-shadow: 0 0 0 3px rgba(30,136,229,0.2);
        }
        .card textarea { min-height: 100px; resize: vertical; }
        .card .btn-submit {
            width: 100%;
            padding: 14px;
            background: #00bfa5;
            color: white;
            font-weight: 700;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            margin-top: 28px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            box-shadow: 0 4px 15px rgba(0,191,165,0.3);
        }
        .card .btn-submit:hover {
            background: #00a891;
            transform: translateY(-2px);
        }
        .card .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .card .success-msg {
            background: #e8f5e9;
            color: #1e5e2e;
            padding: 14px 18px;
            border-radius: 16px;
            margin-top: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            font-weight: 500;
        }
        .card .success-msg.visible { display: flex; }
        .card .error-msg {
            background: #ffebee;
            color: #b71c1c;
            padding: 10px 14px;
            border-radius: 12px;
            margin-top: 12px;
            display: none;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }
        .card .error-msg.visible { display: flex; }
        .card .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #1e88e5;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .card .back-link:hover { text-decoration: underline; }
        @media (max-width: 480px) {
            .card { padding: 25px 18px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <i class="fa-solid fa-hands-asl-interpreting"></i> ISYARA
        </div>
        <div class="sub">Laporkan kendala atau beri saran untuk layanan kami</div>

        <form id="bantuanForm">
            <label for="nama">Nama (opsional)</label>
            <input type="text" id="nama" placeholder="Misal: Budi Santoso">

            <label for="instansi">Lokasi Instansi <span class="required">*</span></label>
            <select id="instansi" required>
                <option value="">-- Pilih Instansi --</option>
                <option value="Dinas Kesehatan Kota A">Dinas Kesehatan Kota A</option>
                <option value="Dinas Capil Kota B">Dinas Capil Kota B</option>
                <option value="Pusat">Kantor Pusat</option>
                <option value="Lainnya">Lainnya</option>
            </select>

            <label for="kategori">Kategori <span class="required">*</span></label>
            <select id="kategori" required>
                <option value="">-- Pilih --</option>
                <option value="Kamera Error">Kamera Error (tidak terdeteksi)</option>
                <option value="Suara Tidak Muncul">Suara Tidak Muncul (Speech-to-Text)</option>
                <option value="Saran Fitur">Saran Fitur</option>
                <option value="Lainnya">Lainnya</option>
            </select>

            <label for="deskripsi">Deskripsi <span class="required">*</span></label>
            <textarea id="deskripsi" placeholder="Ceritakan secara singkat masalah atau saran Anda..." required></textarea>

            <button type="submit" class="btn-submit" id="submitBtn"><i class="fa-regular fa-paper-plane"></i> Kirim Laporan</button>
        </form>

        <div id="successMsg" class="success-msg">
            <i class="fa-regular fa-circle-check"></i>
            <span>Terima kasih, laporan Anda telah diterima tim IT.</span>
        </div>
        <div id="errorMsg" class="error-msg">
            <i class="fa-regular fa-circle-exclamation"></i>
            <span id="errorText">Harap isi semua bidang yang wajib.</span>
        </div>

        <a href="index.html" class="back-link"><i class="fa-regular fa-arrow-left"></i> Kembali ke Beranda</a>
    </div>

    <script src="state_manager.js"></script>
    <script>
        (function() {
            const form = document.getElementById('bantuanForm');
            const submitBtn = document.getElementById('submitBtn');
            const successMsg = document.getElementById('successMsg');
            const errorMsg = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');

            form.addEventListener('submit', function(e) {
                e.preventDefault();
                successMsg.classList.remove('visible');
                errorMsg.classList.remove('visible');

                const nama = document.getElementById('nama').value.trim();
                const instansi = document.getElementById('instansi').value;
                const kategori = document.getElementById('kategori').value;
                const deskripsi = document.getElementById('deskripsi').value.trim();

                if (!instansi || !kategori || !deskripsi) {
                    errorText.textContent = 'Harap isi semua bidang yang wajib (*).';
                    errorMsg.classList.add('visible');
                    return;
                }

                // Proses menggunakan StateManager
                StateManager.processBantuan({
                    kategori: kategori,
                    deskripsi: deskripsi,
                    instansi: instansi
                });

                successMsg.classList.add('visible');
                submitBtn.disabled = true;
                form.reset();

                setTimeout(() => {
                    submitBtn.disabled = false;
                }, 3000);
            });
        })();
    </script>
</body>
</html>
